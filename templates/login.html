<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        body {
            font-family: Arial;
            background: #111;
            color: white;
            text-align: center;
            padding: 50px;
        }

        .box {
            background: #222;
            padding: 30px;
            border-radius: 15px;
            width: 300px;
            margin: auto;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
        }

        button {
            background: #ff6b00;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 8px;
            width: 100%;
        }

        button:hover {
            background: #e65c00;
        }

        a {
            color: #ffb347;
        }
    </style>
</head>
<body>

    <h2>🔐 Login Admin</h2>

    <div class="box">
        <form method="POST">
            <input name="user" placeholder="Usuário">
            <input name="senha" type="password" placeholder="Senha">
            <button type="submit">Entrar</button>
        </form>
    </div>

    <br>
    <a href="/">Voltar</a>

</body>
</html>
